<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>高数期中查分 · B3班</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: #d4e9ff;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            margin: 0;
        }

        .card {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 248, 235, 0.85);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 56px 56px 48px 48px;
            box-shadow: 0 20px 40px rgba(60, 100, 140, 0.25), 0 6px 12px rgba(0, 0, 0, 0.10);
            padding: 28px 22px 34px;
            transition: all 0.2s ease;
            border: 2px solid rgba(180, 210, 240, 0.6);
        }

        .title-block {
            text-align: center;
            margin-bottom: 28px;
            background: linear-gradient(135deg, #1d3b5c, #2f5a7a);
            padding: 22px 12px 18px;
            border-radius: 60px 60px 40px 40px;
            box-shadow: inset 0 -4px 0 #7fa5c9, 0 12px 18px -8px rgba(0, 20, 40, 0.3);
        }

        .title-main {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: #f5e7b0;
            text-shadow: 0 3px 0 #2a4b6a, 0 6px 12px rgba(0,0,0,0.4);
            word-break: break-word;
        }

        .title-sub {
            font-size: 1.2rem;
            font-weight: 600;
            color: #ddf0ff;
            background: rgba(30, 60, 90, 0.6);
            display: inline-block;
            padding: 4px 22px;
            margin-top: 8px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
            letter-spacing: 1px;
            border: 1px solid #8bb9e6;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .search-area {
            background: #eef6fd;
            padding: 24px 18px 28px;
            border-radius: 48px;
            box-shadow: inset 0 2px 10px rgba(60, 110, 160, 0.15), 0 10px 16px rgba(0, 0, 0, 0.06);
            margin-bottom: 28px;
            border: 1px solid #b8d2ed;
            position: relative;
            transition: all 0.3s ease;
        }

        .input-group {
            margin-bottom: 22px;
        }

        .input-group label {
            display: block;
            font-size: 1.3rem;
            font-weight: 700;
            color: #1f405a;
            margin-bottom: 8px;
            padding-left: 6px;
            letter-spacing: 0.5px;
            text-shadow: 0 1px 2px rgba(200, 225, 250, 0.6);
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px;
            font-size: 1.4rem;
            border-radius: 60px;
            border: 2px solid #8bb3d4;
            background: #fafdff;
            transition: 0.2s;
            font-weight: 500;
            color: #1a3144;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.02);
        }

        .input-group input:focus {
            outline: none;
            border-color: #3f7ea8;
            background: #ffffff;
            box-shadow: 0 0 0 5px rgba(70, 140, 200, 0.25);
        }

        .input-group input::placeholder {
            color: #8aadcc;
            font-weight: 400;
            font-size: 1.1rem;
            opacity: 0.8;
        }

        .btn-query {
            width: 100%;
            padding: 18px 10px;
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(145deg, #5b9bd5, #3a7bb5);
            border: none;
            border-radius: 80px;
            color: #f0f9ff;
            text-shadow: 0 2px 4px rgba(0, 40, 70, 0.4);
            box-shadow: 0 10px 0 #1f4d72, 0 6px 16px rgba(30, 80, 130, 0.4);
            transition: 0.08s linear;
            cursor: pointer;
            letter-spacing: 3px;
            margin-top: 8px;
        }

        .btn-query:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #143a55, 0 8px 14px rgba(20, 70, 120, 0.3);
        }

        /* 密码规则提示 - 标准数学形式 */
        .password-hint {
            background: #f0f6fe;
            border-radius: 32px;
            padding: 16px 18px;
            margin-top: 6px;
            margin-bottom: 12px;
            border: 1px solid #b8d2ed;
            font-size: 0.95rem;
            color: #1f405a;
            line-height: 1.7;
            transition: all 0.4s ease;
            overflow: hidden;
            max-height: 300px;
            opacity: 1;
        }

        .password-hint.hidden {
            max-height: 0;
            padding: 0 18px;
            margin-top: 0;
            margin-bottom: 0;
            opacity: 0;
            border: 0;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .password-hint .hint-label {
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 1.0rem;
        }

        /* 标准数学公式样式 */
        .math-display {
            font-family: 'Times New Roman', 'CMU Serif', 'STIX', serif;
            font-style: italic;
            font-size: 1.2rem;
            background: #e3effa;
            padding: 12px 14px;
            border-radius: 12px;
            text-align: center;
            margin: 4px 0;
        }

        .math-display .sum-symbol {
            font-size: 1.8rem;
            font-weight: 400;
        }

        .math-display .limit-sub {
            font-size: 0.85rem;
            vertical-align: sub;
            font-style: normal;
        }

        .math-display .limit-sup {
            font-size: 0.85rem;
            vertical-align: super;
            font-style: normal;
        }

        .math-display .base {
            font-size: 1.3rem;
        }

        .math-display .exponent {
            font-size: 0.85rem;
            vertical-align: super;
        }

        .math-display .fraction {
            display: inline-block;
            vertical-align: middle;
            text-align: center;
            margin: 0 4px;
            font-style: normal;
        }

        .math-display .fraction .numerator {
            display: block;
            border-bottom: 2px solid #1f405a;
            padding: 0 8px 2px;
            font-size: 1.0rem;
        }

        .math-display .fraction .denominator {
            display: block;
            padding: 2px 8px 0;
            font-size: 1.0rem;
        }

        .math-display .paren {
            font-size: 1.3rem;
        }

        .math-display .condition {
            font-style: normal;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.95rem;
            margin-left: 8px;
        }

        .math-display .result-label {
            font-style: normal;
            font-weight: 700;
            font-family: 'Segoe UI', sans-serif;
            font-size: 1.0rem;
            margin-top: 6px;
            display: block;
            color: #1a3a5a;
        }

        .result-panel {
            background: #f5faff;
            border-radius: 48px;
            padding: 20px 16px 22px;
            border: 2px solid #b6d2ec;
            box-shadow: inset 0 2px 12px #d4e6f5, 0 8px 16px rgba(0, 0, 0, 0.08);
            margin-top: 10px;
            transition: all 0.25s;
            min-height: 100px;
        }

        .result-placeholder {
            color: #5c7f9c;
            font-size: 1.4rem;
            font-weight: 500;
            text-align: center;
            padding: 20px 6px;
            background: #e3effa;
            border-radius: 40px;
            letter-spacing: 1px;
            border: 1px dashed #8bb3d4;
        }

        .result-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px 8px 18px;
            background: rgba(220, 240, 255, 0.7);
            border-radius: 60px;
            font-size: 1.6rem;
            font-weight: 700;
            flex-wrap: wrap;
        }

        .result-name-area {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .avatar-icon {
            font-size: 2.0rem;
            line-height: 1;
            display: inline-block;
        }

        .result-label {
            color: #1f405a;
            letter-spacing: 1px;
        }

        .result-score-wrapper {
            display: flex;
            align-items: baseline;
            gap: 6px;
            background: #1a344b;
            padding: 4px 16px 4px 20px;
            border-radius: 60px;
            box-shadow: inset 0 -2px 0 #6f9ac2;
        }

        .result-score-label {
            color: #b6d4f0;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .result-score {
            color: #e6f0fa;
            font-size: 2.2rem;
            font-weight: 800;
            min-width: 50px;
            text-align: center;
        }

        .result-message {
            font-size: 1.0rem;
            font-weight: 600;
            padding: 16px 18px;
            border-radius: 40px;
            text-align: left;
            line-height: 1.6;
            word-break: break-word;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.05);
            border-left: 8px solid #5f8db0;
            background: #f0f8ff;
            color: #1a2f44;
        }

        .msg-6 { color: #1a5a7a; background: #d0eaf5; border-left-color: #2a7aaa; }
        .msg-7 { color: #1a4a7a; background: #cce4f5; border-left-color: #2a6aaa; }
        .msg-8 { color: #1a3a6a; background: #c8def5; border-left-color: #2a5a9a; }

            background: #e0d6c8;
            color: #4f2a1a;
            font-size: 1.6rem;
            font-weight: 600;
            padding: 22px 12px;
            border-radius: 60px;
            text-align: center;
            border-left: 8px solid #a55a3a;
        }

            .card { padding: 20px 14px 26px; }
            .title-main { font-size: 1.9rem; }
            .title-sub { font-size: 1.0rem; }
            .input-group input { font-size: 1.2rem; padding: 14px 18px; }
            .btn-query { font-size: 1.6rem; padding: 16px 10px; }
            .result-row { font-size: 1.3rem; }
            .result-score { font-size: 1.8rem; min-width: 40px; }
            .result-message { font-size: 0.9rem; padding: 14px 14px; }
            .result-score-label { font-size: 0.9rem; }
            .avatar-icon { font-size: 1.6rem; }
            .math-display { font-size: 1.0rem; padding: 10px 8px; }
            .math-display .sum-symbol { font-size: 1.5rem; }
        }
    </style>
</head>

        <button class="btn-query" id="queryBtn">📊 查 分</button>

    <div class="result-panel" id="resultPanel">

</div>

        function getScoreMessage(score) {
            let key;
            if (score === 0) key = '0';
            else if (score < 20) key = '1';
            else if (score >= 20 && score < 40) key = '2';
            else if (score >= 40 && score < 50) key = '3';
            else if (score >= 50 && score < 60) key = '4';
            else if (score >= 60 && score < 70) key = '5';
            else if (score >= 70 && score < 80) key = '6';
            else if (score >= 80 && score < 90) key = '7';
            else if (score >= 90 && score <= 100) key = '8';
            else key = '5';

            const pool = messagePool[key] || messagePool['5'];
            const idx = Math.floor(Math.random() * pool.length);
            return { msg: pool[idx], cls: 'msg-' + key };
        }

        // DOM
        const nameInput = document.getElementById('studentName');
        const pwdInput = document.getElementById('studentPwd');
        const queryBtn = document.getElementById('queryBtn');
        const placeholderMsg = document.getElementById('placeholderMsg');
        const resultContent = document.getElementById('resultContent');
        const passwordHint = document.getElementById('passwordHint');

        function renderResult(student) {
            passwordHint.classList.add('hidden');

            placeholderMsg.style.display = 'none';
            resultContent.style.display = 'block';

            const score = student.期中成绩;
            const avatar = getColoredAvatar(student.姓名);
            const { msg, cls } = getScoreMessage(score);
            const formattedMsg = msg.replace(/\n/g, '<br>');

            resultContent.innerHTML = `
                <div class="result-item">
                    <div class="result-row">
                        <div class="result-name-area">
                            <span class="avatar-icon">${avatar}</span>
                            <span class="result-label">${student.姓名}</span>
                        </div>
                        <span class="result-score-wrapper">
                            <span class="result-score-label">期中分数</span>
                            <span class="result-score">${score}</span>
                        </span>
                    </div>
                    <div class="result-message ${cls}">${formattedMsg}</div>
                    <div style="font-size: 0.9rem; color: #2a4f6a; margin-top: 6px; text-align:center; background: #dcebf7; border-radius: 40px; padding: 6px; font-weight: 500;">学号: ${student.学号}</div>
                </div>
            `;
        }

        function showError(text) {
            passwordHint.classList.remove('hidden');
            placeholderMsg.style.display = 'none';
            resultContent.style.display = 'block';
            resultContent.innerHTML = `<div class="error-msg">❌ ${text}</div>`;
        }

        function resetPlaceholder() {
            passwordHint.classList.remove('hidden');
            placeholderMsg.style.display = 'block';
            resultContent.style.display = 'none';
            resultContent.innerHTML = '';
        }

        function handleQuery() {
            const name = nameInput.value.trim();
            const pwd = pwdInput.value.trim();

            if (!name) {
                showError('请输入姓名');
                return;
            }
            if (!pwd) {
                showError('请输入密码');
                return;
            }

            const student = nameMap.get(name);
            if (!student) {
                showError('未找到该姓名的学生，请确认');
                return;
            }

            const correctPwd = calcPassword(student.学号);
            if (pwd !== correctPwd) {
                showError('密码错误，请重试');
                return;
            }

            renderResult(student);
        }

        queryBtn.addEventListener('click', handleQuery);
        pwdInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                queryBtn.click();
            }
        });
        nameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                pwdInput.focus();
            }
        });

        resetPlaceholder();
    })();
