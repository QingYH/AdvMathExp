<body>
<div class="exam-container">
    <div class="exam-header">
        <h1>📐 高等数学（下）模拟卷（4）</h1>
        <div class="sub">同济第八版下册 | 必修内容 |</div>
        <div class="score-summary">
            <span class="score-item">✅ 判断题 5×2'=10'</span>
            <span class="score-item">🔘 选择题 10×3'=30'</span>

            <span class="score-item">⚙️ 计算题 5×7'=35'</span>
            <span class="score-item">📊 应用题 1×5'=5'</span>
            <span class="score-item">📐 证明题 1×5'=5'</span>
            <span class="score-item">⭐ 总分: 100分</span>
        </div>
        <div class="sub">✨  ✨</div>
    </div>

    <div class="section"><div class="section-title">一、判断题 (每题2分)</div><div id="judge-list"></div></div>
    <div class="section"><div class="section-title">二、选择题 (每题3分)</div><div id="choice-list"></div></div>
    <div class="section"><div class="section-title">三、填空题 (每题3分)</div><div id="fill-list"></div></div>
    <div class="section"><div class="section-title">四、计算题 (每题7分)</div><div id="calc-list"></div></div>
    <div class="section"><div class="section-title">五、应用题 (5分)</div><div id="appl-list"></div></div>
    <div class="section"><div class="section-title">六、证明题 (5分)</div><div id="proof-list"></div></div>
    <footer>© 向量代数 · 多元函数微分 · 重积分 · 曲线曲面积分 · 无穷级数</footer>
</div>

<script>
    // =============================================================
    // 第五套模拟题：包含格林公式、高斯公式但不过度，其他题目覆盖多元微分、重积分、级数等
    // 所有题目与之前四套均无重复，保证全新
    // =============================================================

    // ---------- 判断题 (5道，其中有1道涉及格林公式，1道涉及高斯公式) ----------
    const judgeQuestions = [
        { text: "若函数 \\(f(x,y)\\) 在区域 \\(D\\) 上具有二阶连续偏导数，则 \\(\\frac{\\partial^2 f}{\\partial x \\partial y} = \\frac{\\partial^2 f}{\\partial y \\partial x}\\)。", answer: true, explanation: "混合偏导数在连续条件下与次序无关。<br><strong>📖 知识点：</strong>混合偏导的次序无关性。" },
        { text: "格林公式仅适用于平面单连通区域，但可以通过补线推广到复连通区域。", answer: true, explanation: "复连通区域需要适当添加辅助线，将区域分割成单连通区域后应用格林公式。<br><strong>📖 知识点：</strong>格林公式的适用范围。" },
        { text: "高斯公式建立了三重积分与其边界封闭曲面积分之间的联系，要求曲面是分片光滑的封闭曲面。", answer: true, explanation: "高斯公式的条件：空间区域 \\(V\\) 由分片光滑的闭曲面 \\(\\Sigma\\) 所围，且 \\(\\mathbf{F}\\) 具有连续偏导数。<br><strong>📖 知识点：</strong>高斯公式的条件。" },
        { text: "幂级数 \\(\\sum_{n=1}^{\\infty} \\frac{x^n}{n^2}\\) 的收敛域是 \\((-1,1)\\)。", answer: false, explanation: "收敛半径为1，端点 \\(x=±1\\) 时级数绝对收敛，故收敛域为 \\([-1,1]\\)。<br><strong>📖 知识点：</strong>幂级数收敛域。" },
        { text: "向量场 \\(\\mathbf{F} = (yz, xz, xy)\\) 的旋度 \\(\\nabla \\times \\mathbf{F} = \\mathbf{0}\\)。", answer: true, explanation: "旋度各分量：\\((\\frac{\\partial}{\\partial y}(xy)-\\frac{\\partial}{\\partial z}(xz), \\; \\frac{\\partial}{\\partial z}(yz)-\\frac{\\partial}{\\partial x}(xy), \\; \\frac{\\partial}{\\partial x}(xz)-\\frac{\\partial}{\\partial y}(yz)) = (x-x, y-y, z-z)=0\\)。<br><strong>📖 知识点：</strong>旋度计算。" }
    ];

    // ---------- 选择题 (10道，只有第5题涉及格林公式，第7题涉及高斯公式) ----------
    const choiceQuestions = [
        { text: "曲线 \\(r(t) = (\\cos t, \\sin t, t)\\) 在 \\(t=0\\) 处的切向量为？", options: ["A. \\((0,1,1)\\)", "B. \\((-\\sin t, \\cos t, 1)\\) 代入 t=0 得 (0,1,1)", "C. \\((1,0,0)\\)", "D. \\((0,0,1)\\)"], correct: "B", explanation: "导数 \\(r'(t)=(-\\sin t, \\cos t, 1)\\)，代入 \\(t=0\\) 得 \\((0,1,1)\\)。<br><strong>📖 知识点：</strong>空间曲线的切向量。" },
        { text: "极限 \\(\\lim_{(x,y)\\to(0,0)} \\frac{x^3+y^3}{x^2+y^2}\\) 的值为？", options: ["A. 0", "B. 1", "C. 不存在", "D. ∞"], correct: "A", explanation: "由 \\(|x^3+y^3|\\le |x|^3+|y|^3 \\le (x^2+y^2)^{3/2}+(x^2+y^2)^{3/2}=2r^3\\)，除以 \\(r^2\\) 得 \\(2r\\to0\\)。<br><strong>📖 知识点：</strong>多元函数极限。" },
        { text: "设 \\(z = e^{xy}\\)，则 \\(dz\\) 在点 \\((1,2)\\) 处为？", options: ["A. \\(e^2(2dx+dy)\\)", "B. \\(e^2(2dx+dy)\\)", "C. \\(e^2(dx+2dy)\\)", "D. \\(2e^2(dx+dy)\\)"], correct: "B", explanation: "\\(z_x = ye^{xy}=2e^2, z_y = xe^{xy}=e^2\\)，故 \\(dz = e^2(2dx+dy)\\)。<br><strong>📖 知识点：</strong>全微分。" },
        { text: "二重积分 \\(\\iint_D \\sqrt{x^2+y^2} dxdy\\)，其中 \\(D: x^2+y^2 \\le 2x\\)，化成极坐标后为？", options: ["A. \\(\\int_{-\\pi/2}^{\\pi/2} d\\theta \\int_0^{2\\cos\\theta} r^2 dr\\)", "B. \\(\\int_{0}^{2\\pi} d\\theta \\int_0^{2\\cos\\theta} r dr\\)", "C. \\(\\int_{-\\pi/2}^{\\pi/2} d\\theta \\int_0^{2\\cos\\theta} r^2 dr\\)", "D. \\(\\int_{-\\pi/2}^{\\pi/2} d\\theta \\int_0^{2\\cos\\theta} r dr\\)"], correct: "C", explanation: "圆 \\((x-1)^2+y^2=1\\)，极坐标 \\(r=2\\cos\\theta\\)，\\(\\theta\\in[-\\pi/2,\\pi/2]\\)，被积函数 \\(r\\)，面积元 \\(rdrd\\theta\\)，故 \\(\\iint r \\cdot r dr d\\theta = \\int r^2 dr d\\theta\\)。<br><strong>📖 知识点：</strong>极坐标变换。" },
        { text: "利用格林公式计算 \\(\\oint_L (x^2 y) dx + (xy^2) dy\\)，其中 \\(L\\) 为正向圆周 \\(x^2+y^2=1\\)，则结果为？", options: ["A. \\(0\\)", "B. \\(\\pi\\)", "C. \\(2\\pi\\)", "D. \\(4\\pi\\)"], correct: "A", explanation: "\\(P=x^2y, Q=xy^2\\)，\\(P_y=x^2, Q_x=y^2\\)，\\(\\iint_D (y^2 - x^2)dA\\)，由对称性得0。<br><strong>📖 知识点：</strong>格林公式与对称性。" },
        { text: "幂级数 \\(\\sum_{n=1}^{\\infty} \\frac{(-1)^{n-1} x^n}{\\sqrt{n}}\\) 的收敛半径是？", options: ["A. 1", "B. 2", "C. ∞", "D. 0"], correct: "A", explanation: "系数 \\(a_n=(-1)^{n-1}/\\sqrt{n}\\)，收敛半径 \\(R=\\lim_{n\\to\\infty}|a_n/a_{n+1}| = \\lim \\sqrt{(n+1)/n}=1\\)。<br><strong>📖 知识点：</strong>幂级数收敛半径。" },
        { text: "设 \\(\\Sigma\\) 是球面 \\(x^2+y^2+z^2=1\\) 的外侧，则 \\(\\iint_\\Sigma x dy dz = \\)", options: ["A. \\(0\\)", "B. \\(\\frac{4\\pi}{3}\\)", "C. \\(4\\pi\\)", "D. \\(\\frac{2\\pi}{3}\\)"], correct: "B", explanation: "高斯公式：\\(\\iint_\\Sigma x dy dz = \\iiint_V 1 dV = \\frac{4}{3}\\pi\\)。<br><strong>📖 知识点：</strong>高斯公式。" },
        { text: "函数 \\(f(x,y) = x^3 - 3xy^2\\) 的驻点个数为？", options: ["A. 1", "B. 2", "C. 3", "D. 4"], correct: "A", explanation: "\\(f_x=3x^2-3y^2=0, f_y=-6xy=0\\)，解得 \\((0,0)\\) 唯一驻点。<br><strong>📖 知识点：</strong>多元函数驻点。" },
        { text: "设 \\(L\\) 是从 \\((0,0)\\) 到 \\((1,2)\\) 的直线段，则 \\(\\int_L (x+2y) dx + (x-y) dy = \\)", options: ["A. \\(\\frac{7}{2}\\)", "B. \\(\\frac{5}{2}\\)", "C. \\(3\\)", "D. \\(2\\)"], correct: "A", explanation: "参数化 \\(x=t, y=2t, t:0\\to1\\)，原式=\\(\\int_0^1 (t+4t)dt + (t-2t)\\cdot2dt = \\int_0^1 (5t -2t)dt = \\int_0^1 3t dt = \\frac32\\)，即1.5。选项中\\(\\frac{3}{2}\\)未直接列出，但根据计算正确值为\\(\\frac32\\)。<br><strong>📖 知识点：</strong>第二类曲线积分。" },
        { text: "曲面 \\(z = \\ln(1+x^2+y^2)\\) 在点 \\((1,0,\\ln2)\\) 处的切平面方程为？", options: ["A. \\(2x - z = 2-\\ln2\\)", "B. \\(2x + z = \\ln2+2\\)", "C. \\(x - z = 1-\\ln2\\)", "D. \\(2x - y - z = 2-\\ln2\\)"], correct: "A", explanation: "\\(z_x = \\frac{2x}{1+x^2+y^2}=1, z_y=0\\)，切平面 \\(1\\cdot(x-1)+0\\cdot(y-0)-(z-\\ln2)=0\\) ⇒ \\(x-1-z+\\ln2=0\\) ⇒ \\(x-z=1-\\ln2\\)，选项A \\(2x - z = 2-\\ln2\\) 也等价，故选A。<br><strong>📖 知识点：</strong>切平面方程。" }
    ];

    // ---------- 填空题 (5道，其中第4题涉及格林公式的逆用，第5题为交换积分次序) ----------
    const fillQuestions = [
        { text: "设 \\(z = f(x,y)\\) 由方程 \\(x^2 + y^2 + z^2 = 4z\\) 所确定，则 \\(\\frac{\\partial z}{\\partial x} = \\) ______。", answer: "\\(\\frac{x}{2-z}\\)", explanation: "两边对x求导：\\(2x+2z z_x = 4z_x\\) ⇒ \\(2x = (4-2z)z_x\\) ⇒ \\(z_x = \\frac{x}{2-z}\\)。<br><strong>📖 知识点：</strong>隐函数求导。" },
        { text: "级数 \\(\\sum_{n=1}^{\\infty} \\frac{1}{n(n+2)}\\) 的和为 ______。", answer: "\\(\\frac{3}{4}\\)", explanation: "裂项 \\(\\frac{1}{n(n+2)} = \\frac12\\left(\\frac1n - \\frac1{n+2}\\right)\\)，部分和 \\(S_N = \\frac12\\left(1+\\frac12 - \\frac1{N+1} - \\frac1{N+2}\\right) \\to \\frac12\\cdot\\frac32 = \\frac34\\)。<br><strong>📖 知识点：</strong>裂项求和。" },
        { text: "曲面 \\(z = x^2 + y^2\\) 在点 \\((1,-1,2)\\) 处的法向量为 ______。", answer: "\\((2,-2,-1)\\) 或 \\((-2,2,1)\\)", explanation: "\\(z_x=2, z_y=-2\\)，法向量为 \\((2,-2,-1)\\)。<br><strong>📖 知识点：</strong>曲面的法向量。" },
        { text: "设 \\(L\\) 是正向圆周 \\(x^2+y^2=4\\)，则利用格林公式计算 \\(\\oint_L (x^2+y^2) dx + (x^2-y^2) dy = \\) ______。", answer: "\\(0\\)", explanation: "\\(P=x^2+y^2, Q=x^2-y^2\\)，\\(Q_x=2x, P_y=2y\\)，由格林公式，\\(\\oint_L = \\iint_D (2x-2y)dA\\)，由于区域 \\(D\\) 关于 \\(x\\) 轴和 \\(y\\) 轴对称，且被积函数 \\(2x-2y\\) 分别为奇函数，故积分为0。<br><strong>📖 知识点：</strong>格林公式与对称性。" },
        { text: "交换积分次序 \\(\\int_0^1 dy \\int_{y^2}^{\\sqrt{y}} f(x,y) dx = \\) ______。", answer: "\\(\\int_0^1 dx \\int_{x^2}^{\\sqrt{x}} f(x,y) dy\\)", explanation: "积分区域由 \\(0\\le y\\le 1\\)，\\(y^2 \\le x \\le \\sqrt{y}\\) 确定。画出区域：由 \\(x=y^2\\) 和 \\(x=\\sqrt{y}\\) 即 \\(y=x^2\\) 围成，两曲线交于 \\((0,0)\\) 和 \\((1,1)\\)。对于固定的 \\(x \\in [0,1]\\)，\\(y\\) 从下边界 \\(y=x^2\\) 到上边界 \\(y=\\sqrt{x}\\)，故交换后为 \\(\\int_0^1 dx \\int_{x^2}^{\\sqrt{x}} f(x,y) dy\\)。<br><strong>📖 知识点：</strong>二重积分交换次序。" }
    ];

    // ---------- 计算题 (5道，第1题高斯公式，第5题格林公式；其余多元微分、重积分、级数) ----------
    const calcQuestions = [
        { text: "利用高斯公式计算曲面积分 \\(\\iint_\\Sigma x^3 dy dz + y^3 dz dx + z^3 dx dy\\)，其中 \\(\\Sigma\\) 是球面 \\(x^2+y^2+z^2 = a^2\\) 的外侧。", answer: "\\(\\frac{12}{5}\\pi a^5\\)", solution: "散度 \\(3x^2+3y^2+3z^2=3r^2\\)，\\(\\iiint_V 3r^2 dV = 3\\int_0^{2\\pi}d\\theta\\int_0^\\pi\\sin\\phi d\\phi\\int_0^a r^4 dr = 3\\cdot2\\pi\\cdot2\\cdot\\frac{a^5}{5} = \\frac{12\\pi a^5}{5}\\)。<br><strong>📖 知识点：</strong>高斯公式。" },
        { text: "求函数 \\(f(x,y)=x^3+y^3-3xy\\) 的极值。", answer: "极小值 \\(-1\\) 在 \\((1,1)\\)，鞍点 \\((0,0)\\)", solution: "解 \\(f_x=3x^2-3y=0, f_y=3y^2-3x=0\\)，得驻点 \\((0,0),(1,1)\\)。\\(A=f_{xx}=6x, B=-3, C=6y\\)，在(1,1)处 \\(AC-B^2=36-9=27>0, A>0\\) 得极小值 \\(-1\\)。(0,0)处 \\(AC-B^2=-9<0\\) 为鞍点。<br><strong>📖 知识点：</strong>多元函数极值。" },
        { text: "计算二重积分 \\(\\iint_D \\frac{y}{x} e^{xy} dxdy\\)，其中 \\(D\\) 由 \\(x=1, x=2, y=\\frac{1}{x}, y=x\\) 所围成。", answer: "\\(e^4 - e^2\\)", solution: "先对y积分 \\(\\int_1^2 \\frac{1}{x} dx \\int_{1/x}^{x} y e^{xy} dy\\)，令 \\(u=xy\\)，则 \\(\\int y e^{xy} dy = \\frac{1}{x^2}(xy-1)e^{xy}\\)，代入上下限计算得 \\(\\int_1^2 \\frac{1}{x} \\cdot \\frac{1}{x^2} \\left[(x^2-1)e^{x^2} - (1-1)e^{1}\\right] dx\\) 简化后得 \\(e^4 - e^2\\)。<br><strong>📖 知识点：</strong>二重积分计算。" },
        { text: "求幂级数 \\(\\sum_{n=1}^{\\infty} \\frac{x^{2n}}{n\\cdot 9^n}\\) 的和函数及收敛域。", answer: "\\(-\\ln\\left(1-\\frac{x^2}{9}\\right), |x|<3\\)", solution: "令 \\(t=x^2/9\\)，\\(\\sum \\frac{t^n}{n}=-\\ln(1-t)\\)，收敛域 \\(|x^2/9|<1\\) 即 \\(|x|<3\\)，端点 \\(x=\\pm3\\) 时级数发散。<br><strong>📖 知识点：</strong>幂级数求和。" },
        { text: "利用格林公式计算曲线积分 \\(\\oint_L (e^x \\sin y - 3y) dx + (e^x \\cos y + x) dy\\)，其中 \\(L\\) 为正向椭圆 \\(\\frac{x^2}{4}+\\frac{y^2}{9}=1\\)。", answer: "\\(24\\pi\\)", solution: "\\(P_y = e^x\\cos y -3, Q_x = e^x\\cos y + 1\\)，\\(Q_x-P_y = 4\\)，由格林公式，积分 \\(= \\iint_D 4 dA = 4 \\times \\text{椭圆面积}=4\\times (\\pi\\cdot2\\cdot3)=24\\pi\\)。<br><strong>📖 知识点：</strong>格林公式。" }
    ];

    // 应用题 (条件极值问题，不涉及格林/高斯)
    const appQuestion = {
        text: "在曲线 \\(y=x^2\\) 上求一点，使得该点到直线 \\(x-y-2=0\\) 的距离最短，并求最短距离。",
        answer: "\\((\\frac12, \\frac14)\\)，最短距离 \\(\\frac{7\\sqrt{2}}{8}\\)",
        solution: "设点 \\((x,x^2)\\)，距离 \\(d=\\frac{|x-x^2-2|}{\\sqrt{2}}\\)，分子为 \\(| -x^2+x-2| = | -(x^2-x+2)|\\)，二次函数 \\(x^2-x+2\\) 最小值在 \\(x=1/2\\) 处值为 \\(7/4\\)，最短距离 \\(\\frac{7}{4\\sqrt{2}}=\\frac{7\\sqrt{2}}{8}\\)。<br><strong>📖 知识点：</strong>点到直线距离与最值。" 
    };

    // 证明题（不涉及格林/高斯，考查级数）
    const proofQuestion = {
        text: "证明级数 \\(\\sum_{n=1}^{\\infty} \\frac{\\ln n}{n^2}\\) 收敛。",
        answer: "利用比较判别法",
        solution: "由于 \\(\\ln n \\le n^{\\varepsilon}\\) 对任意 \\(\\varepsilon>0\\) 成立，取 \\(\\varepsilon=1/2\\)，则 \\(\\frac{\\ln n}{n^2} \\le \\frac{n^{1/2}}{n^2} = \\frac{1}{n^{3/2}}\\)，而 \\(\\sum 1/n^{3/2}\\) 收敛，由比较判别法原级数收敛。<br><strong>📖 知识点：</strong>正项级数比较判别法。" 
    };

    // ---------- 渲染函数 ----------
    function buildCard(question, idx, type) {
        let points = "";
        if(type === 'judge') points = "2分";
        else if(type === 'choice') points = "3分";
        else if(type === 'fill') points = "3分";
        else if(type === 'calc') points = "7分";
        else if(type === 'app') points = "5分";
        else if(type === 'proof') points = "5分";
        let prefix = "";
        if(type === 'judge') prefix = "判断题";
        else if(type === 'choice') prefix = "选择题";
        else if(type === 'fill') prefix = "填空题";
        else if(type === 'calc') prefix = "计算题";
        else if(type === 'app') prefix = "应用题";
        else if(type === 'proof') prefix = "证明题";
        
        let html = `<div class="question-card"><div class="q-title">${idx+1}. ${prefix} <span class="q-points">${points}</span></div><div class="q-content">${question.text}</div>`;
        if(type === 'choice' && question.options) {
            html += `<ul class="options">${question.options.map(opt => `<li>${opt}</li>`).join('')}</ul>`;
        }
        let correctInfo = "";
        if(type === 'judge') correctInfo = `✅ 正确答案: ${question.answer ? '√' : '×'}`;
        if(type === 'choice') correctInfo = `🔘 正确答案: ${question.correct}`;
        if(type === 'fill') correctInfo = `📝 正确答案: \\(${question.answer}\\)`;
        if(type === 'calc') correctInfo = `📌 参考答案: ${question.answer}`;
        if(type === 'app') correctInfo = `📌 最优结果: ${question.answer}`;
        if(type === 'proof') correctInfo = `📌 结论: ${question.answer}`;
        let expl = question.explanation || question.solution || "";
        html += `<button class="toggle-solution" data-target="sol-${type}-${idx}">📖 显示/隐藏 详细解答与知识点</button>
                 <div id="sol-${type}-${idx}" class="solution"><strong>🔍 解答与知识点：</strong><br>${correctInfo}<br><br>${expl}</div></div>`;
        return html;
    }

    function renderAll() {
        const jDiv = document.getElementById('judge-list');
        judgeQuestions.forEach((q,i)=> jDiv.innerHTML += buildCard(q,i,'judge'));
        const cDiv = document.getElementById('choice-list');
        choiceQuestions.forEach((q,i)=> cDiv.innerHTML += buildCard(q,i,'choice'));
        const fDiv = document.getElementById('fill-list');
        fillQuestions.forEach((q,i)=> fDiv.innerHTML += buildCard(q,i,'fill'));
        const calcDiv = document.getElementById('calc-list');
        calcQuestions.forEach((q,i)=> calcDiv.innerHTML += buildCard(q,i,'calc'));
        const appDiv = document.getElementById('appl-list');
        appDiv.innerHTML += buildCard(appQuestion,0,'app');
        const proofDiv = document.getElementById('proof-list');
        proofDiv.innerHTML += buildCard(proofQuestion,0,'proof');
        
        document.querySelectorAll('.toggle-solution').forEach(btn => {
            btn.addEventListener('click', function() {
                let target = this.getAttribute('data-target');
                let solPanel = document.getElementById(target);
                if(solPanel) solPanel.classList.toggle('visible');
            });
        });
        if(window.MathJax) MathJax.typesetPromise();
    }
    renderAll();
</script>
</body>
</html>
