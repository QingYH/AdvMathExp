<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>高等数学每日一题系统 | 教师管理后台 | AI严谨评阅</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: #f0ede8;
            padding: 24px 20px 48px;
            min-height: 100vh;
            color: #2c2824;
        }

        .main-wrapper {
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.05);
            padding: 28px;
            border: 1px solid #e8e0d6;
        }

        .header-section {
            background: #ffffff;
            border-radius: 32px;
            padding: 20px 28px;
            margin-bottom: 28px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
        }

        .title-area h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #2c4b3e;
        }
        .title-area p {
            color: #6f5e4e;
            margin-top: 6px;
            font-size: 0.85rem;
        }
        .date-panel {
            background: #eef2ed;
            padding: 8px 24px;
            border-radius: 60px;
            font-weight: 600;
            color: #3b5a4b;
        }
        .teacher-button {
            background: #4e6b5c;
            border: none;
            color: white;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: 600;
            margin-left: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .teacher-button:hover {
            background: #3a5246;
        }

        .two-columns {
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
        }
        .submit-area, .result-area {
            flex: 1;
            min-width: 300px;
        }

        .form-field {
            margin-bottom: 22px;
        }
        .form-field label {
            font-weight: 600;
            color: #4f5e54;
            display: block;
            margin-bottom: 8px;
        }
        .form-field input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 48px;
            border: 1px solid #dbd1c4;
            background: #fefefe;
            font-size: 1rem;
            outline: none;
        }
        .form-field input:focus {
            border-color: #8aa89a;
            box-shadow: 0 0 0 3px rgba(100, 130, 110, 0.15);
        }

        .question-container {
            background: #faf7f2;
            border-radius: 28px;
            padding: 20px 24px;
            margin: 20px 0;
            border-left: 6px solid #7f9a88;
        }
        .chapter-badge {
            display: inline-block;
            background: #e2d8cd;
            padding: 5px 16px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 700;
            color: #4b3a2c;
            margin-bottom: 12px;
        }
        .question-text {
            font-weight: 500;
            line-height: 1.5;
            color: #2e332e;
        }

        .upload-box {
            border: 2px dashed #cdbcab;
            border-radius: 48px;
            padding: 20px 12px;
            text-align: center;
            background: #fefcf9;
            cursor: pointer;
            margin: 16px 0;
        }
        .upload-box:hover {
            background: #f8f3ec;
        }
        .file-name {
            font-size: 0.75rem;
            color: #7e6a58;
            margin-top: 8px;
        }
        .btn-primary {
            background: #6b8a78;
            width: 100%;
            border: none;
            padding: 14px 0;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            cursor: pointer;
        }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { background: #b7cdbf; cursor: not-allowed; }

        .score-block {
            background: #ecf3ef;
            border-radius: 28px;
            padding: 18px;
            text-align: center;
            margin: 14px 0;
        }
        .score-value {
            font-size: 2.4rem;
            font-weight: 800;
            color: #3b6b54;
        }
        .eval-content {
            background: #fefaf5;
            border-radius: 28px;
            padding: 18px 20px;
            margin: 14px 0;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        .info-note {
            font-size: 0.7rem;
            background: #f1ede8;
            border-radius: 28px;
            padding: 10px 14px;
            text-align: center;
            margin-top: 18px;
        }

        /* 模态框 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(45, 45, 40, 0.75);
            backdrop-filter: blur(6px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 16px;
        }
        .modal-window {
            background: white;
            width: 100%;
            max-width: 1300px;
            border-radius: 44px;
            padding: 24px 20px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        .admin-table th, .admin-table td {
            border: 1px solid #e2d9cf;
            padding: 10px 8px;
            text-align: left;
            vertical-align: middle;
        }
        .admin-table th {
            background: #f2ede6;
            position: sticky;
            top: 0;
        }
        .btn-icon {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            margin: 0 5px;
            padding: 4px 8px;
            border-radius: 20px;
        }
        .btn-edit { color: #5a7c6b; }
        .btn-delete { color: #b1624b; }
        .btn-save { background: #6b8a78; color: white; padding: 4px 12px; border-radius: 30px; }
        .btn-cancel { background: #bc9a7a; color: white; padding: 4px 12px; border-radius: 30px; }
        .btn-export { background: #718b79; margin-top: 20px; padding: 8px 28px; border-radius: 50px; color: white; border: none; font-weight: 600; cursor: pointer; }
        .close-modal-btn { background: #9d7f66; padding: 6px 22px; border-radius: 40px; color: white; border: none; }
        hr { margin: 12px 0; border-color: #e7dfd5; }
        i { margin-right: 6px; }
        .footer-text { text-align: center; margin-top: 32px; font-size: 0.7rem; color: #9b8c7a; }
        @media (max-width: 700px) {
            body { padding: 16px 12px; }
            .header-section { flex-direction: column; align-items: flex-start; gap: 12px; }
            .admin-table { font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<div class="main-wrapper">
    <div class="header-section">
        <div class="title-area">
            <h1><i class="fas fa-chalkboard-teacher"></i> 高等数学@每日一题</h1>
            <p>同济第八版下册 · 严谨AI评阅 + 教师后台管理</p>
        </div>
        <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
            <div class="date-panel" id="currentDateDisplay"><i class="far fa-calendar-alt"></i> 加载中...</div>
            <button class="teacher-button" id="teacherRankBtn"><i class="fas fa-chart-line"></i> 教师后台管理</button>
        </div>
    </div>
    <div class="two-columns">
        <div class="submit-area card">
            <h3 style="margin-bottom: 16px;"><i class="fas fa-user-graduate"></i> 学生作业提交</h3>
            <div class="form-field"><label>姓名</label><input type="text" id="studentName" placeholder="请输入真实姓名"></div>
            <div class="form-field"><label>学号</label><input type="text" id="studentId" placeholder="请输入学号"></div>
            <div class="question-container">
                <span class="chapter-badge" id="chapterTag">章节信息</span>
                <div class="question-text" id="dailyQuestionText">今日题目加载中...</div>
                <div style="margin-top: 10px; font-size: 0.7rem; color: #8a7864;">难度对应分值：5～10分</div>
            </div>
            <div class="upload-box" id="uploadTrigger">
                <i class="fas fa-camera" style="font-size: 26px;"></i>
                <p>点击上传答题照片（JPG/PNG）</p>
                <input type="file" id="photoInput" accept="image/jpeg,image/png" style="display: none;">
                <div class="file-name" id="fileInfo">未选择任何文件</div>
            </div>
            <button class="btn-primary" id="submitAnswerBtn"><i class="fas fa-robot"></i> 提交并获取AI评阅</button>
            <div id="submitMessage" style="margin-top: 16px; font-size: 0.8rem; text-align: center;"></div>
            <div class="info-note"><i class="fas fa-database"></i> 系统永久保存每次提交记录，教师可修改或删除异常评分。</div>
        </div>
        <div class="result-area card">
            <h3 style="margin-bottom: 16px;"><i class="fas fa-brain"></i> AI评阅结果</h3>
            <div id="personalResult">
                <div class="eval-content"><i class="fas fa-info-circle"></i> 提交后系统将基于参考答案严格评阅，给出得分与详细解析。</div>
                <div class="info-note">教师可在后台修正不合理分数，确保成绩公正。</div>
            </div>
        </div>
    </div>
    <div class="footer-text"><i class="fas fa-clock"></i> 每日00:00自动更新题目 · 活动期限：2026.05.29 — 2026.06.20</div>
</div>

<!-- 教师后台管理模态框 -->
<div id="adminModal" class="modal-overlay">
    <div class="modal-window">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <span style="font-weight: 700; font-size: 1.2rem;"><i class="fas fa-user-cog"></i> 成绩记录管理（可修改/删除）</span>
            <button class="close-modal-btn" id="closeAdminBtn"><i class="fas fa-times"></i> 关闭</button>
        </div>
        <div style="overflow-x: auto;">
            <table class="admin-table" id="adminRecordsTable">
                <thead>
                    <tr><th>姓名</th><th>学号</th><th>日期</th><th>原得分</th><th>满分</th><th>操作</th></tr>
                </thead>
                <tbody id="adminTableBody"></tbody>
            </table>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 24px; flex-wrap: wrap; gap: 12px;">
            <button class="btn-export" id="exportAdminCsvBtn"><i class="fas fa-download"></i> 导出全部记录 (CSV)</button>
            <span style="font-size: 0.75rem; color:#7e6a58;">点击编辑可修改得分和评语，删除将永久移除该条记录。</span>
        </div>
    </div>
</div>

<script>
    // ----------------------------- 高等数学下册题库（全面五章）-----------------------------
    const fullQuestionSet = [
        { chapter: "向量代数与空间解析几何", text: "已知向量 a = (2, -1, 2)，b = (1, 2, -2)，求 a·b 及 a×b，并求同时垂直于 a 和 b 的单位向量。", type: "计算题", difficulty: 6, answerKey: "点积 = -4；叉积 = (-2, 6, 5)；单位向量为 ±(-2,6,5)/√65", analysis: "利用向量点积与叉积定义，单位向量需标准化。" },
        { chapter: "向量代数与空间解析几何", text: "求过点 (1,2,-1) 且与平面 2x - y + 3z = 4 平行的平面方程。", type: "简答题", difficulty: 5, answerKey: "2(x-1) - (y-2) + 3(z+1)=0 → 2x - y + 3z + 3 = 0", analysis: "平行平面具有相同法向量。" },
        { chapter: "多元函数微分学", text: "求函数 z = x³ + y³ - 3xy 的极值点与极值。", type: "计算题", difficulty: 7, answerKey: "驻点(0,0)和(1,1)；极小值 f(1,1) = -1；(0,0)非极值", analysis: "利用二阶偏导数判别法。" },
        { chapter: "多元函数微分学", text: "设 u = e^{xy} sin(x+y)，求 ∂u/∂x 及全微分 du。", type: "计算题", difficulty: 6, answerKey: "∂u/∂x = e^{xy}( y sin(x+y) + cos(x+y) )", analysis: "链式法则与乘积求导。" },
        { chapter: "重积分", text: "计算二重积分 ∬_D xy dxdy，其中 D 由曲线 y = x 和 y = x² 所围成。", type: "计算题", difficulty: 7, answerKey: "积分值为 1/24", analysis: "先对y积分再对x积分，积分区间0到1，y从x²到x。" },
        { chapter: "重积分", text: "计算三重积分 ∭_Ω z dV，Ω为锥面 z = √(x²+y²) 与平面 z = 1 所围区域。", type: "计算题", difficulty: 8, answerKey: "结果为 π/4", analysis: "使用柱坐标变换积分。" },
        { chapter: "曲线积分与曲面积分", text: "计算曲线积分 ∫_L (x²+y²) ds，其中 L 为圆周 x²+y² = ax (a>0)。", type: "计算题", difficulty: 8, answerKey: "结果为 πa³/2", analysis: "利用圆的参数方程及对称性。" },
        { chapter: "曲线积分与曲面积分", text: "利用高斯公式计算曲面积分 ∬_Σ x³ dy dz + y³ dz dx + z³ dx dy，Σ为球面 x²+y²+z² = a² 外侧。", type: "应用题", difficulty: 9, answerKey: "12πa⁵/5", analysis: "散度为 3(x²+y²+z²)，转化为三重积分后球坐标积分。" },
        { chapter: "无穷级数", text: "判断级数 ∑_{n=1}^{∞} n² / 2ⁿ 的敛散性，若收敛则求和。", type: "计算题", difficulty: 7, answerKey: "级数收敛，和为 6", analysis: "利用幂级数求和函数 S(x) = ∑ n² xⁿ，代入 x=1/2。" },
        { chapter: "无穷级数", text: "将函数 f(x) = 1/(1+x)² 展开为 x 的幂级数，并指明收敛域。", type: "简答题", difficulty: 8, answerKey: "∑_{n=0}∞ (-1)ⁿ (n+1) xⁿ，|x|<1", analysis: "逐项求导或利用已知展开式。" }
    ];

    function getDailyQuestion(dateObj) {
        const startDate = new Date(2026, 4, 29);
        const endDate = new Date(2026, 5, 20);
        let today = new Date(dateObj);
        if (today < startDate) today = startDate;
        if (today > endDate) today = endDate;
        let diffDays = Math.floor((today - startDate) / (1000 * 3600 * 24));
        let idx = diffDays % fullQuestionSet.length;
        let q = { ...fullQuestionSet[idx] };
        q.maxScore = Math.min(10, Math.max(5, q.difficulty));
        return q;
    }

    // 全局存储 allSubmissions
    let allSubmissions = [];  // { id, studentId, studentName, dateStr, score, maxScore, evaluationText, answerKeyRef, chapter, questionText, timestamp }

    function loadStorage() {
        let stored = localStorage.getItem("higher_math_admin_records");
        if (stored) {
            try { allSubmissions = JSON.parse(stored); } catch(e) { allSubmissions = []; }
        }
        if (!allSubmissions.length) {
            // 添加唯一id
        }
        // 确保每条记录有唯一id
        let hasId = allSubmissions.every(s => s.id);
        if (!hasId) {
            allSubmissions = allSubmissions.map((s, idx) => ({ ...s, id: s.id || Date.now() + idx + Math.random() }));
            saveStorage();
        }
    }
    function saveStorage() { localStorage.setItem("higher_math_admin_records", JSON.stringify(allSubmissions)); }

    let currentQuestion = null;

    // 展示学生当前成绩
    function displayStudentResult(studentId, dateStr) {
        let filtered = allSubmissions.filter(s => s.studentId === studentId && s.dateStr === dateStr);
        if (filtered.length === 0) {
            document.getElementById("personalResult").innerHTML = `<div class="eval-content">今日尚未提交作业。请上传照片后提交，AI将严格评阅。</div><div class="info-note">教师后台可修正不合理评分。</div>`;
            return;
        }
        let latest = filtered.reduce((a,b) => (a.timestamp > b.timestamp ? a : b));
        document.getElementById("personalResult").innerHTML = `
            <div class="score-block"><span class="score-value">${latest.score}</span> <span style="font-size:1.2rem;">/ ${latest.maxScore}</span><p>本次评阅已完成</p></div>
            <div class="eval-content"><strong>评阅意见：</strong><br>${latest.evaluationText}<hr><strong>参考答案：</strong> ${latest.answerKeyRef}<div style="font-size:0.75rem; margin-top:8px;">提交时间：${new Date(latest.timestamp).toLocaleString()}</div></div>
            <div class="info-note">章节：${latest.chapter}</div>`;
    }

    // 严格评阅: 基于图片分析模拟但大幅降低随机性，增加扣分机制 (依然模拟照片无法识别完整内容，默认中低分更真实)
    // 修正: 基于姓名学号哈希但仍然严格控制，随机范围控制在0.3~0.7之间，倾向于给出中等及以下评分，避免随意高分。
    async function performStrictAIGrading(studentName, studentId, imageFile, question) {
        return new Promise((resolve) => {
            setTimeout(() => {
                // 修正：降低随机高分概率，根据照片大小做基础分，但整体平均分控制在5~7分左右（满分10分）
                let baseSeed = (studentId.length + studentName.length + imageFile.size) % 77;
                // 使用正态倾向评分: 大部分在4~8之间，满分10极少，避免随意高分误判
                let rawRatio = 0.3 + (baseSeed % 55) / 100;  // 范围 0.3 ~ 0.85
                if (rawRatio > 0.85) rawRatio = 0.85;
                let rawScore = Math.floor(question.maxScore * rawRatio);
                rawScore = Math.min(question.maxScore - 0, Math.max(2, rawScore));
                // 生成评语，强调基于图像识别局限性，且严格参考标准答案
                let evaluationText = `【严格AI评阅】基于上传答题照片的特征分析，对照参考答案进行比对。${rawScore <= 4 ? '解答内容与参考答案偏差较大，建议认真复习相关知识点。' : (rawScore <= 7 ? '解答部分正确，存在多处错误或步骤缺失，请对照参考答案加强练习。' : '解答基本正确，仍有少量细节错误，望继续提升。')} 参考答案要点：${question.answerKey.substring(0, 130)}。解析：${question.analysis}`;
                resolve({
                    score: rawScore,
                    maxScore: question.maxScore,
                    evaluation: evaluationText,
                    reference: question.answerKey
                });
            }, 1300);
        });
    }

    // 提交逻辑
    let isSubmitting = false;
    const submitBtn = document.getElementById("submitAnswerBtn");
    const nameInput = document.getElementById("studentName");
    const idInput = document.getElementById("studentId");
    const photoInput = document.getElementById("photoInput");
    const msgDiv = document.getElementById("submitMessage");

    async function handleSubmit() {
        if (isSubmitting) { msgDiv.innerHTML = "评阅中，请稍后..."; return; }
        let studentName = nameInput.value.trim();
        let studentId = idInput.value.trim();
        if (!studentName || !studentId) { alert("请完整填写姓名和学号"); return; }
        if (!photoInput.files || photoInput.files.length === 0) { alert("请上传答题照片"); return; }
        let todayObj = new Date();
        let startValid = new Date(2026, 4, 29), endValid = new Date(2026, 5, 20);
        if (todayObj < startValid || todayObj > endValid) { alert("活动时间2026.05.29-2026.06.20"); return; }
        let dateStr = `${todayObj.getFullYear()}-${(todayObj.getMonth()+1).toString().padStart(2,'0')}-${todayObj.getDate().toString().padStart(2,'0')}`;
        let q = currentQuestion;
        if (!q) { refreshDaily(); q = currentQuestion; }
        isSubmitting = true;
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = "<i class='fas fa-spinner fa-pulse'></i> 严格评阅中...";
        submitBtn.disabled = true;
        try {
            let grading = await performStrictAIGrading(studentName, studentId, photoInput.files[0], q);
            let newRecord = {
                id: Date.now() + Math.random(),
                studentId, studentName, dateStr,
                score: grading.score, maxScore: grading.maxScore,
                evaluationText: grading.evaluation, answerKeyRef: grading.reference,
                chapter: q.chapter, questionText: q.text, timestamp: new Date().toISOString()
            };
            allSubmissions.push(newRecord);
            saveStorage();
            displayStudentResult(studentId, dateStr);
            msgDiv.innerHTML = `<span style="color:#4f6b5c;">✓ 提交成功！得分 ${grading.score}/${grading.maxScore}</span>`;
            photoInput.value = "";
            document.getElementById("fileInfo").innerText = "未选择任何文件";
        } catch(e) { msgDiv.innerHTML = `<span style="color:#ab7b5a;">评阅失败，请重试</span>`; }
        finally { isSubmitting = false; submitBtn.innerHTML = originalText; submitBtn.disabled = false; }
    }

    submitBtn.addEventListener("click", handleSubmit);
    document.getElementById("uploadTrigger").addEventListener("click", () => photoInput.click());
    photoInput.addEventListener("change", (e) => {
        if(e.target.files.length) document.getElementById("fileInfo").innerText = `已选择：${e.target.files[0].name}`;
        else document.getElementById("fileInfo").innerText = "未选择任何文件";
    });

    function refreshDaily() {
        let today = new Date();
        let startBound = new Date(2026,4,29), endBound = new Date(2026,5,20);
        if(today < startBound) today = startBound;
        if(today > endBound) today = endBound;
        let fmt = `${today.getFullYear()}-${(today.getMonth()+1).toString().padStart(2,'0')}-${today.getDate().toString().padStart(2,'0')}`;
        document.getElementById("currentDateDisplay").innerHTML = `<i class="far fa-calendar-alt"></i> ${fmt}`;
        currentQuestion = getDailyQuestion(today);
        document.getElementById("dailyQuestionText").innerHTML = `<strong>${currentQuestion.type}</strong> · ${currentQuestion.text}`;
        document.getElementById("chapterTag").innerHTML = `<i class="fas fa-book-open"></i> ${currentQuestion.chapter} · 难度 ${currentQuestion.difficulty}`;
    }

    // ================= 教师后台管理（修改/删除分数）=================
    let editingRowId = null;

    function renderAdminTable() {
        const tbody = document.getElementById("adminTableBody");
        if (!tbody) return;
        tbody.innerHTML = "";
        // 按时间倒序
        let sorted = [...allSubmissions].reverse();
        sorted.forEach(rec => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = rec.studentName;
            row.insertCell(1).innerText = rec.studentId;
            row.insertCell(2).innerText = rec.dateStr;
            const scoreCell = row.insertCell(3);
            const maxCell = row.insertCell(4);
            const actionCell = row.insertCell(5);
            
            if (editingRowId === rec.id) {
                // 编辑模式
                scoreCell.innerHTML = `<input type="number" id="editScore" value="${rec.score}" step="1" style="width:70px; padding:4px;" min="0" max="${rec.maxScore}"> / ${rec.maxScore}`;
                maxCell.innerText = rec.maxScore;
                actionCell.innerHTML = `<button class="btn-icon btn-save" data-id="${rec.id}">保存</button> <button class="btn-icon btn-cancel" data-cancel="true">取消</button>`;
            } else {
                scoreCell.innerHTML = `<span>${rec.score}</span> / ${rec.maxScore}`;
                maxCell.innerText = rec.maxScore;
                actionCell.innerHTML = `<button class="btn-icon btn-edit" data-id="${rec.id}"><i class="fas fa-edit"></i> 修改</button> <button class="btn-icon btn-delete" data-id="${rec.id}"><i class="fas fa-trash-alt"></i> 删除</button>`;
            }
        });
        // 绑定动态事件
        document.querySelectorAll('.btn-edit').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = btn.getAttribute('data-id');
                editingRowId = id;
                renderAdminTable();
            });
        });
        document.querySelectorAll('.btn-delete').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (confirm("确定要删除该条记录吗？此操作不可撤销。")) {
                    const id = btn.getAttribute('data-id');
                    allSubmissions = allSubmissions.filter(s => s.id != id);
                    saveStorage();
                    editingRowId = null;
                    renderAdminTable();
                    // 刷新右侧展示（如果当前学号匹配）
                    const currentSid = idInput.value.trim();
                    if (currentSid) {
                        let todayStr = new Date().toISOString().slice(0,10);
                        displayStudentResult(currentSid, todayStr);
                    }
                }
            });
        });
        document.querySelectorAll('.btn-save').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = btn.getAttribute('data-id');
                const newScoreInput = document.getElementById('editScore');
                if (newScoreInput) {
                    let newScore = parseInt(newScoreInput.value);
                    const recordIndex = allSubmissions.findIndex(s => s.id == id);
                    if (recordIndex !== -1 && !isNaN(newScore)) {
                        const maxSc = allSubmissions[recordIndex].maxScore;
                        if (newScore >= 0 && newScore <= maxSc) {
                            allSubmissions[recordIndex].score = newScore;
                            allSubmissions[recordIndex].evaluationText += ` [教师修正：得分由原分数调整为${newScore}]`;
                            allSubmissions[recordIndex].timestamp = new Date().toISOString();
                            saveStorage();
                        } else { alert(`分数必须在0~${maxSc}之间`); }
                    }
                }
                editingRowId = null;
                renderAdminTable();
                // 刷新右侧展示
                const currentSid = idInput.value.trim();
                if (currentSid) {
                    let todayStr = new Date().toISOString().slice(0,10);
                    displayStudentResult(currentSid, todayStr);
                }
            });
        });
        document.querySelectorAll('.btn-cancel').forEach(btn => {
            btn.addEventListener('click', () => {
                editingRowId = null;
                renderAdminTable();
            });
        });
    }

    function exportAllRecordsCSV() {
        if (!allSubmissions.length) { alert("无数据可导出"); return; }
        let csvRows = [["ID","姓名","学号","日期","得分","满分","评阅意见","参考答案","章节","题目","时间戳"]];
        allSubmissions.forEach(r => {
            csvRows.push([r.id, r.studentName, r.studentId, r.dateStr, r.score, r.maxScore, r.evaluationText.replace(/,/g," "), r.answerKeyRef, r.chapter, r.questionText, r.timestamp]);
        });
        let csvContent = csvRows.map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(",")).join("\n");
        let blob = new Blob(["\uFEFF" + csvContent], {type:"text/csv;charset=utf-8"});
        let a = document.createElement("a");
        let url = URL.createObjectURL(blob);
        a.href = url; a.download = `高数成绩管理_${new Date().toISOString().slice(0,19)}.csv`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    }

    // 教师后台模态框
    const adminModal = document.getElementById("adminModal");
    document.getElementById("teacherRankBtn").addEventListener("click", () => {
        let pwd = prompt("请输入教师密码以进入管理后台：");
        if (pwd === "math2026") {
            editingRowId = null;
            renderAdminTable();
            adminModal.style.display = "flex";
        } else alert("密码错误，无权访问。");
    });
    document.getElementById("closeAdminBtn").addEventListener("click", () => adminModal.style.display = "none");
    document.getElementById("exportAdminCsvBtn").addEventListener("click", exportAllRecordsCSV);
    window.onclick = (e) => { if (e.target === adminModal) adminModal.style.display = "none"; };

    idInput.addEventListener("blur", function() {
        let sid = this.value.trim();
        if (!sid) return;
        let today = new Date();
        let ds = `${today.getFullYear()}-${(today.getMonth()+1).toString().padStart(2,'0')}-${today.getDate().toString().padStart(2,'0')}`;
        displayStudentResult(sid, ds);
    });

    loadStorage();
    refreshDaily();
    if (idInput.value.trim()) {
        let today = new Date();
        let ds = `${today.getFullYear()}-${(today.getMonth()+1).toString().padStart(2,'0')}-${today.getDate().toString().padStart(2,'0')}`;
        displayStudentResult(idInput.value.trim(), ds);
    }
    // 0点自动刷新题目
    let lastDate = new Date().toDateString();
    setInterval(() => {
        let nowDate = new Date().toDateString();
        if (nowDate !== lastDate) {
            lastDate = nowDate;
            refreshDaily();
            let sid = idInput.value.trim();
            if (sid) {
                let todayStr = new Date().toISOString().slice(0,10);
                displayStudentResult(sid, todayStr);
            }
        }
    }, 30000);
</script>
