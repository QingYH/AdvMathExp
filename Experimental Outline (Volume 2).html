    const experimentsData = [
        // 第8章 (索引0~4)
        { chap:"第8章 向量代数与空间解析几何", chapDesc:"空间向量运算、平面与直线、曲面与曲线",
          name:"实验8.1 向量的线性运算与点积",
          purpose:"深入理解空间向量的加法、数乘的平行四边形法则和三角形法则，掌握点积的代数定义与几何意义（模长与夹角余弦的乘积）。通过交互实验，直观感受向量投影在工程力学、计算机图形学中的应用，培养抽象代数与几何直观相结合的能力。",
          task:"给定向量 a = (2,1,3)，b = (1,-1,2)。(1) 计算 a+b，2a-3b；(2) 计算点积 a·b 并求出 a 与 b 的夹角余弦；(3) 求 a 在 b 上的投影向量，并验证正交分解。最终将结果与理论值对比。",
          plan:"利用GeoGebra动态构造两个向量，实时显示和向量与差向量，展示投影滑块；MATLAB符号验证点积和夹角，Python使用NumPy进行数值验证及可视化箭头。最后通过三维图展示投影几何关系。",
          navigation:"思考点积的交换律与分配律如何通过几何图形验证？在物理中，变力做功的计算正是点积的典型应用。若两个向量方向相反，点积有何特征？零向量的点积性质是什么？尝试构造三个向量验证 (a+b)·c = a·c + b·c，并用几何解释。进一步探究: 如果 a·b = 0 是否一定 a⊥b？请思考在复向量中的推广意义。",
          codes: { ggb:"a = (2,1,3)\nb = (1,-1,2)\nsum = a+b\ndiff = 2a-3b\ndot = a·b\nangle = arccos(dot / (|a| |b|))\nproj = (dot/(b·b)) * b\n// 动态展示投影向量\nSetColor(a, red)\nSetColor(b, blue)\nSetColor(proj, green)\nText(proj, \"投影向量\")", matlab:"a = [2,1,3]; b = [1,-1,2];\nsum_ab = a + b;\nlincomb = 2*a - 3*b;\ndot_ab = dot(a,b);\nangle_rad = acos(dot_ab/(norm(a)*norm(b)));\nproj = (dot_ab/(norm(b)^2))*b;\nfprintf('和: [%d,%d,%d]\\n',sum_ab);\nfprintf('夹角余弦: %.4f\\n',cos(angle_rad));\nfprintf('投影向量: [%.2f,%.2f,%.2f]\\n',proj);", python:"import numpy as np\na=np.array([2,1,3]); b=np.array([1,-1,2])\nprint('a+b:', a+b, '\\n2a-3b:', 2*a-3*b)\ndot=np.dot(a,b); norm_a=np.linalg.norm(a); norm_b=np.linalg.norm(b)\ncos_theta=dot/(norm_a*norm_b)\nprint(f'点积:{dot}, 夹角余弦:{cos_theta:.4f}')\nproj=(dot/np.dot(b,b))*b\nprint('投影向量:', proj)" } },
        { name:"实验8.2 空间平面的方程与绘制", purpose:"通过点法式方程深入理解空间平面由法向量唯一确定方向，从几何和代数两个角度掌握平面的一般方程。实验帮助学生建立三维空间中平面截距、法向量倾斜与平面姿态的直观联系。", task:"给定平面过点 P(1,1,1) 且法向量 n=(2,-1,3)。(1) 写出平面点法式方程并化为一般式；(2) 在三维空间中绘制该平面；(3) 判断点 Q(0,2,3) 是否位于平面上，并说明几何意义。", plan:"GeoGebra 使用 Plane 指令直接生成平面，并用滑块改变法向量分量观察平面旋转；MATLAB 用 meshgrid 绘制半透明曲面并标记点 Q；Python 用 Matplotlib 绘制3D曲面并高亮检测点。", navigation:"思考：如果法向量变为原来的两倍，平面方程有何变化？平面的一般式 Ax+By+Cz+D=0 中，D 的几何意义是什么？如何求平面与三个坐标轴的交点？当平面过原点时系数满足什么条件？尝试给定三个不共线的点，求出平面方程并与点法式对照。应用：在三维建模中如何通过法向量和点定义物体表面？", codes:{ ggb:"P=(1,1,1); n=(2,-1,3)\nplane1: Plane(P, n)\nQ=(0,2,3)\nContains(plane1, Q)\n// 动态调节法向量\nslider a=2,b=-1,c=3\nplane2: Plane(P, (a,b,c))", matlab:"[X,Y]=meshgrid(-2:0.2:4);\nZ = 1 - (2*(X-1) - (Y-1))/3;\nsurf(X,Y,Z,'FaceAlpha',0.6); hold on;\nplot3(0,2,3,'ro','MarkerSize',10);\ntitle('平面 2(x-1)-(y-1)+3(z-1)=0');", python:"import numpy as np; import matplotlib.pyplot as plt\nfrom mpl_toolkits.mplot3d import Axes3D\nx=np.linspace(-2,4,30); y=np.linspace(-2,4,30)\nX,Y=np.meshgrid(x,y)\nZ=1-(2*(X-1)-(Y-1))/3\nfig=plt.figure(); ax=fig.add_subplot(111,projection='3d')\nax.plot_surface(X,Y,Z, alpha=0.6)\nax.scatter(0,2,3, color='red', s=50)\nplt.show()" } },
        { name:"实验8.3 空间直线的参数方程与交点", purpose:"掌握空间直线的对称式、参数式方程，理解方向向量的作用，并能够求解直线与平面的交点，培养三维解析几何的综合运算能力。", task:"直线 L 过原点 (0,0,0)，方向向量 d=(1,2,1)，平面 Π: x+y+z=6。求直线 L 与平面 Π 的交点坐标，并画出直线与平面的相交图形，验证交点的唯一性。", plan:"GeoGebra 使用 Line 和 Intersect 直接求交点；MATLAB 符号求解参数 t；Python 用 sympy 解方程。最后通过三维动态图展示直线穿透平面的过程。", navigation:"当方向向量与平面法向量垂直时，直线与平面有何位置关系？若直线与平面平行，交点情况如何？参数方程中参数的几何意义是距离比例吗？尝试求过一点且与已知直线垂直的直线方程。拓展：异面直线的公垂线如何求解？", codes:{ ggb:"lineL: Line((0,0,0), (1,2,1))\nplaneP: x+y+z=6\ninter=Intersect(lineL, planeP)\n// 显示交点坐标 (1,2,1)\nSetColor(lineL, blue)\nSetColor(planeP, lightgray)", matlab:"syms t; x=t; y=2*t; z=t;\neq=x+y+z-6; t_sol=solve(eq,t);\nP=[t_sol,2*t_sol,t_sol];\ndisp('交点坐标:'); disp(double(P));", python:"from sympy import symbols, solve\nt=symbols('t'); x,y,z=t,2*t,t\nsol=solve(x+y+z-6, t)\nP=[sol[0],2*sol[0],sol[0]]\nprint('直线与平面交点:', P)" } },
        { name:"实验8.4 常见二次曲面：椭球面与单叶双曲面", purpose:"通过标准方程绘制椭球面和单叶双曲面，观察参数变化对曲面形状的影响，理解二次曲面分类及截痕法。", task:"(1) 绘制椭球面 x²/4 + y²/9 + z²/1 = 1；(2) 绘制单叶双曲面 x²/4 + y²/9 − z² = 1；(3) 改变半轴长度观察曲面伸缩，并求 z=0 截痕。", plan:"GeoGebra 内置 Ellipsoid 和 Hyperboloid 指令，添加滑动条动态调节半轴；MATLAB 用 ellipsoid 和隐函数 fsurf；Python 用 plotly 或 matplotlib 绘制等值面。", navigation:"为什么椭球面所有截痕都是椭圆？单叶双曲面为什么是直纹面，它在建筑中有何应用（如冷却塔）？双叶双曲面与单叶双曲面的区别在于负号个数。尝试求双曲面与平面 z=k 的截痕曲线类型，探究当 k 变化时由椭圆变为双曲线的原因。", codes:{ ggb:"a=2; b=3; c=1\nEllipsoid((0,0,0), a,b,c)\nHyperboloid((0,0,0), a,b,c,1)\n// 调节滑动条观察变形", matlab:"[x,y,z]=ellipsoid(0,0,0,2,3,1,30);\nsurf(x,y,z,'FaceAlpha',0.6); hold on;\nf=@(x,y) sqrt(x.^2/4 + y.^2/9 - 1);\n[X,Y]=meshgrid(-3:0.1:3); Z=real(f(X,Y));\nsurf(X,Y,Z,'EdgeColor','none');", python:"import numpy as np; import matplotlib.pyplot as plt\nfrom mpl_toolkits.mplot3d import Axes3D\nfig=plt.figure(); ax=fig.add_subplot(111,projection='3d')\nu=np.linspace(0,2*np.pi,30); v=np.linspace(0,np.pi,30)\nx=2*np.outer(np.cos(u),np.sin(v)); y=3*np.outer(np.sin(u),np.sin(v))\nz=1*np.outer(np.ones_like(u),np.cos(v))\nax.plot_surface(x,y,z, alpha=0.5); plt.show()" } },
        { name:"实验8.5 空间曲线的投影与螺旋线", purpose:"掌握空间曲线的参数表示方法，理解将空间曲线投影到坐标面从而降维分析的思想，并通过螺旋线案例加深对工程曲线的认识。", task:"给定螺旋线 r(t)=(cos t, sin t, t/2)，t∈[0,4π]。(1) 绘制三维螺旋线；(2) 求出其在 xOy 平面上的投影曲线方程并绘图；(3) 说明投影曲线的几何特征。", plan:"GeoGebra 用 Curve 指令绘制螺旋线和投影曲线；MATLAB 分别 plot3 和 plot；Python 使用 mplot3d 同时绘制主曲线和红色虚线投影。", navigation:"螺旋线的螺距与参数 t 系数的关系是什么？如果改为 (cos t, sin t, t)，螺距如何变化？投影到 yOz 平面会得到什么曲线？在实际工程中，螺旋线常用于弹簧、螺纹的设计，思考如何通过改变参数获得变螺距螺旋线。", codes:{ ggb:"curve1: Curve(cos(t), sin(t), t/2, t, 0, 4π)\nproj: Curve(cos(t), sin(t), 0, t, 0, 4π)\nSetColor(curve1, magenta)\nSetColor(proj, orange)", matlab:"t=0:0.05:4*pi; x=cos(t); y=sin(t); z=t/2;\nplot3(x,y,z,'b','LineWidth',2); hold on;\nplot3(x,y,zeros(size(z)),'r--','LineWidth',1.5);\nview(45,30); legend('螺旋线','投影曲线');", python:"t=np.linspace(0,4*np.pi,500); x=np.cos(t); y=np.sin(t); z=t/2\nfig=plt.figure(); ax=fig.add_subplot(111,projection='3d')\nax.plot(x,y,z, label='helix'); ax.plot(x,y,0*z,'r--', label='projection')\nax.legend(); plt.show()" } },
        // 第9章 (5个实验)
        { chap:"第9章 多元函数微分法及其应用", chapDesc:"偏导数、全微分、方向导数、极值", name:"实验9.1 偏导数的几何可视化", purpose:"通过二元函数的曲面图形，直观理解偏导数∂f/∂x和∂f/∂y的几何意义——分别表示曲面沿x轴和y轴方向切线的斜率，培养多元微分几何直觉。", task:"函数 f(x,y)=x²−y²，计算在点 (1,1) 处的一阶偏导数值，并在曲面图上绘制该点处沿x方向和y方向的切线，验证偏导数值与切线斜率的一致性。", plan:"GeoGebra 中绘制马鞍面，使用 Tangent 指令分别绘制沿x方向和y方向的切线；MATLAB 符号求导后绘制切平面与方向曲线；Python 使用 Sympy 求偏导并叠加切线。", navigation:"如果函数在某点偏导数存在但函数不可微，举例说明(如 f(x,y)=|xy|^0.5 在原点)。混合偏导数与求导顺序无关需要满足什么条件？尝试构造一个二阶混合偏导不相等的函数并观察。", codes:{ ggb:"f(x,y)=x^2-y^2\nP=(1,1)\ntangentX: Tangent(P, f, x)\ntangentY: Tangent(P, f, y)", matlab:"syms x y; f=x^2-y^2; fx=diff(f,x); fy=diff(f,y);\nsubs(fx,{x,y},{1,1}); subs(fy,{x,y},{1,1});", python:"from sympy import symbols,diff; x,y=symbols('x y')\nf=x**2-y**2; fx=diff(f,x); fy=diff(f,y)\nprint(fx.subs({x:1,y:1}), fy.subs({x:1,y:1}))" } },

                const uid = `exp_${ch.start+i}_${Date.now()}_${i}`;
                html += `<div class="exp-card"><div class="exp-title"><i class="fas fa-flask"></i> ${exp.name}</div><div class="exp-content">
                <div class="section-block"><h4><i class="fas fa-bullseye"></i> 实验目的</h4><p>${exp.purpose}</p></div>
                <div class="section-block"><h4><i class="fas fa-tasks"></i> 实验任务</h4><p>${exp.task}</p></div>
                <div class="section-block"><h4><i class="fas fa-chalkboard"></i> 实验方案</h4><p>${exp.plan}</p></div>
                <div class="section-block"><h4><i class="fas fa-compass"></i> 探究学习导航</h4><p>${exp.navigation}</p></div>
                <div class="code-tabs" id="code-${uid}"><div class="code-header"><span class="code-lang active" data-lang="ggb">GeoGebra</span><span class="code-lang" data-lang="mat">MATLAB</span><span class="code-lang" data-lang="py">Python</span></div>
                <pre id="pre-ggb-${uid}" class="code-pre">${escapeHtml(ggbCode)}</pre><pre id="pre-mat-${uid}" class="code-pre" style="display:none;">${escapeHtml(matCode)}</pre><pre id="pre-py-${uid}" class="code-pre" style="display:none;">${escapeHtml(pyCode)}</pre>
                <div class="btn-wrap"><button class="copy-btn" data-expid="${uid}" data-lang="ggb">📋 复制代码</button></div>
                </div></div></div>`;
            }
            html += `</div></div>`;
        }
        container.innerHTML = html;
        document.querySelectorAll('.code-tabs').forEach(tab => {
            const btns = tab.querySelectorAll('.code-lang');
            const copyBtn = tab.querySelector('.copy-btn');
            const preGgb = tab.querySelector('[id^="pre-ggb"]');
            const preMat = tab.querySelector('[id^="pre-mat"]');
            const prePy = tab.querySelector('[id^="pre-py"]');
            btns.forEach(btn => {
                btn.addEventListener('click', () => {
                    btns.forEach(b=>b.classList.remove('active'));
                    btn.classList.add('active');
                    const lang = btn.getAttribute('data-lang');
                    if(preGgb) preGgb.style.display = lang==='ggb'?'block':'none';
                    if(preMat) preMat.style.display = lang==='mat'?'block':'none';
                    if(prePy) prePy.style.display = lang==='py'?'block':'none';
                    copyBtn.setAttribute('data-lang', lang);
                });
            });
            copyBtn.addEventListener('click', () => {
                const lang = copyBtn.getAttribute('data-lang') || 'ggb';
                let code = '';
                if(lang==='ggb') code = preGgb ? preGgb.innerText : '';
                else if(lang==='mat') code = preMat ? preMat.innerText : '';
                else code = prePy ? prePy.innerText : '';
                navigator.clipboard.writeText(code).then(()=>{
                    copyBtn.innerText = '✓ 已复制';
                    setTimeout(()=> copyBtn.innerText = '📋 复制代码',1200);
                });
            });
        });
    }
    function escapeHtml(str){ return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;});}
    renderFull();
</script>
</body>
</html>
