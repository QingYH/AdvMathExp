<div class="exam-container">
    <div class="exam-header">
        <h1>📐 高等数学（下）期末模拟 · （3）</h1>
        <div class="sub">同济第八版下册 | 必修内容| </div>
        <div class="score-summary">
            <span class="score-item">✅ 判断题 5×2'=10'</span>
            <span class="score-item">🔘 选择题 10×3'=30'</span>
            <span class="score-item">📝 填空题 5×3'=15'</span>
            <span class="score-item">⚙️ 计算题 5×7'=35'</span>
            <span class="score-item">📊 应用题 1×5'=5'</span>
            <span class="score-item">📐 证明题 1×5'=5'</span>
            <span class="score-item">⭐ 总分: 100分</span>
        </div>
        <div class="sub">✨  每道题均附详细解答与知识点 ✨</div>
    </div>

    <div class="section"><div class="section-title">一、判断题 (每题2分)</div><div id="judge-list"></div></div>
    <div class="section"><div class="section-title">二、选择题 (每题3分)</div><div id="choice-list"></div></div>
    <div class="section"><div class="section-title">三、填空题 (每题3分)</div><div id="fill-list"></div></div>
    <div class="section"><div class="section-title">四、计算题 (每题7分)</div><div id="calc-list"></div></div>
    <div class="section"><div class="section-title">五、应用题 (5分)</div><div id="appl-list"></div></div>
    <div class="section"><div class="section-title">六、证明题 (5分)</div><div id="proof-list"></div></div>
    <footer>© 向量代数 · 多元微分 · 重积分 · 曲线曲面积分 · 无穷级数 </footer>
</div>

<script>
    // =============================================================
    // 第三套模拟题：完全独立，与前两套无重复，全面覆盖下册核心章节
    // 包含: 空间向量、多元微分、重积分、曲线曲面积分、级数
    // =============================================================

    // ---------- 判断题 (5道) ----------
    const judgeQuestions = [
        { text: "若向量 \\(\\vec{a},\\vec{b}\\) 满足 \\(|\\vec{a}+\\vec{b}|=|\\vec{a}-\\vec{b}|\\)，则 \\(\\vec{a}\\perp\\vec{b}\\)。", answer: true, explanation: "两边平方得 \\(|\\vec{a}|^2+|\\vec{b}|^2+2\\vec{a}\\cdot\\vec{b}=|\\vec{a}|^2+|\\vec{b}|^2-2\\vec{a}\\cdot\\vec{b}\\)，推出 \\(4\\vec{a}\\cdot\\vec{b}=0\\)，故垂直。<br><strong>📖 知识点：</strong>向量垂直的代数条件。" },
        { text: "函数 \\(z = \\arctan(xy)\\) 在点 \\((0,0)\\) 处的全微分为 \\(0\\)。", answer: true, explanation: "\\(z_x = \\frac{y}{1+x^2y^2}, z_y = \\frac{x}{1+x^2y^2}\\)，在 \\((0,0)\\) 处均为0，故 \\(dz=0\\)。<br><strong>📖 知识点：</strong>全微分计算。" },
        { text: "第二类曲面积分 \\(\\iint_\\Sigma P dy dz + Q dz dx + R dx dy\\) 与曲面的侧无关。", answer: false, explanation: "第二类曲面积分与曲面的侧有关，改变侧方向，积分变号。<br><strong>📖 知识点：</strong>有向曲面积分的侧向性。" },
        { text: "若级数 \\(\\sum u_n\\) 条件收敛，则 \\(\\sum u_n^2\\) 一定发散。", answer: true, explanation: "条件收敛则 \\(u_n\\to0\\)，但 \\(|u_n|\\ge u_n^2\\) 最终不成立，经典结论：条件收敛级数平方后一般发散，因通项不趋于0的速度。<br><strong>📖 知识点：</strong>条件收敛的性质。" },
        { text: "设 \\(\\Sigma\\) 是球面 \\(x^2+y^2+z^2=R^2\\) 的外侧，则 \\(\\iint_\\Sigma x^2 dy dz = \\frac{4}{3}\\pi R^4\\)。", answer: false, explanation: "由对称性和高斯公式，\\(\\iint_\\Sigma x^2 dy dz = \\iiint_V 2x dV =0\\) (奇函数对称性)，故应为0。<br><strong>📖 知识点：</strong>高斯公式及对称性。" }
    ];

    // ---------- 选择题 (10道，全新) ----------
    const choiceQuestions = [
        { text: "向量 \\(\\vec{a}=(1,2,2)\\) 在 \\(\\vec{b}=(2,1,-2)\\) 上的投影为？", options: ["A. \\(\\frac{2}{3}\\)", "B. \\(\\frac{4}{3}\\)", "C. \\(\\frac{1}{3}\\)", "D. \\(0\\)"], correct: "B", explanation: "投影 \\(\\frac{\\vec{a}\\cdot\\vec{b}}{|\\vec{b}|}=\\frac{2+2-4}{3}=0\\)？计算：\\(1\\cdot2+2\\cdot1+2\\cdot(-2)=2+2-4=0\\)，投影为0，选项D正确。修正答案为D。", correct: "D", explanation: "点积 \\(1\\cdot2+2\\cdot1+2\\cdot(-2)=0\\)，投影 \\(0/3=0\\)。<br><strong>📖 知识点：</strong>向量投影公式。" },
        { text: "极限 \\(\\lim_{(x,y)\\to(0,0)} \\frac{x^2 y^2}{x^2+y^2}\\) 的值为？", options: ["A. 0", "B. 1", "C. 不存在", "D. ∞"], correct: "A", explanation: "由 \\(0\\le \\frac{x^2y^2}{x^2+y^2}\\le \\frac{(x^2+y^2)^2/4}{x^2+y^2}=\\frac{x^2+y^2}{4}\\to0\\)，夹逼得0。<br><strong>📖 知识点：</strong>多元函数极限。" },
        { text: "设 \\(z = f(x^2-y^2, xy)\\)，其中 \\(f\\) 具有连续偏导数，则 \\(\\frac{\\partial z}{\\partial x} = \\)？", options: ["A. \\(2x f_1 + y f_2\\)", "B. \\(2x f_1 - y f_2\\)", "C. \\(2x f_1 + x f_2\\)", "D. \\(2x f_1 + 2y f_2\\)"], correct: "A", explanation: "设 \\(u=x^2-y^2, v=xy\\)，则 \\(z_x = f_u \\cdot 2x + f_v \\cdot y = 2x f_1 + y f_2\\)。<br><strong>📖 知识点：</strong>复合函数链式法则。" },
        { text: "二重积分 \\(\\iint_D \\sqrt{x^2+y^2} dxdy\\)，其中 \\(D: x^2+y^2\\le 2x\\)，化成极坐标后为？", options: ["A. \\(\\int_{-\\pi/2}^{\\pi/2} d\\theta \\int_0^{2\\cos\\theta} r^2 dr\\)", "B. \\(\\int_{0}^{2\\pi} d\\theta \\int_0^{2\\cos\\theta} r^2 dr\\)", "C. \\(\\int_{0}^{\\pi} d\\theta \\int_0^{2\\cos\\theta} r^2 dr\\)", "D. \\(\\int_{-\\pi/2}^{\\pi/2} d\\theta \\int_0^{2\\cos\\theta} r dr\\)"], correct: "A", explanation: "圆 \\((x-1)^2+y^2=1\\)，极坐标 \\(r=2\\cos\\theta\\)，\\(\\theta\\in[-\\pi/2,\\pi/2]\\)，被积函数 \\(r\\)，面积元 \\(rdrd\\theta\\)，故 \\(\\iint r \\cdot r dr d\\theta = \\int r^2 dr d\\theta\\)。<br><strong>📖 知识点：</strong>极坐标变换。" },
        { text: "设 \\(L\\) 为从 \\((0,0)\\) 到 \\((1,2)\\) 的直线段，则 \\(\\int_L (x+y) dx + (x-y) dy = \\)？", options: ["A. \\(\\frac{1}{2}\\)", "B. \\(-\\frac{1}{2}\\)", "C. \\(1\\)", "D. \\(-1\\)"], correct: "A", explanation: "参数化 \\(x=t, y=2t, t:0\\to1\\)，原式=\\(\\int_0^1 (t+2t) dt + (t-2t)\\cdot2dt = \\int_0^1 (3t + (-t)\\cdot2)dt = \\int_0^1 (3t-2t)dt = \\int_0^1 t dt = \\frac12\\)。<br><strong>📖 知识点：</strong>第二类曲线积分。" },
        { text: "下列级数中，发散的是？", options: ["A. \\(\\sum_{n=1}^{\\infty} \\frac{n!}{n^n}\\)", "B. \\(\\sum_{n=1}^{\\infty} \\frac{1}{n\\ln n}\\)", "C. \\(\\sum_{n=1}^{\\infty} \\frac{1}{n^2+1}\\)", "D. \\(\\sum_{n=1}^{\\infty} \\frac{1}{2^n}\\)"], correct: "B", explanation: "由积分判别法，\\(\\int_2^\\infty \\frac{dx}{x\\ln x}\\) 发散，故 \\(\\sum 1/(n\\ln n)\\) 发散。<br><strong>📖 知识点：</strong>正项级数敛散性。" },
        { text: "曲面 \\(z = \\ln(x^2+y^2)\\) 在点 \\((1,0,0)\\) 处的法向量为？", options: ["A. \\((2,0,-1)\\)", "B. \\((2,0,1)\\)", "C. \\((1,0,-1)\\)", "D. \\((0,2,-1)\\)"], correct: "A", explanation: "\\(z_x= \\frac{2x}{x^2+y^2}=2, z_y=0\\)，法向量 \\((z_x,z_y,-1)=(2,0,-1)\\)。<br><strong>📖 知识点：</strong>曲面的法向量。" },
        { text: "幂级数 \\(\\sum_{n=0}^{\\infty} \\frac{(-1)^n x^{2n+1}}{(2n+1)!}\\) 的和函数是？", options: ["A. \\(\\sin x\\)", "B. \\(\\cos x\\)", "C. \\(e^x\\)", "D. \\(\\ln(1+x)\\)"], correct: "A", explanation: "这是 \\(\\sin x\\) 的麦克劳林展开式。<br><strong>📖 知识点：</strong>常见幂级数展开。" },
        { text: "设 \\(\\Sigma\\) 是锥面 \\(z=\\sqrt{x^2+y^2}\\) 介于 \\(z=0\\) 和 \\(z=1\\) 之间的部分，则 \\(\\iint_\\Sigma dS = \\)？", options: ["A. \\(\\sqrt{2}\\pi\\)", "B. \\(\\sqrt{2}\\pi\\)", "C. \\(\\pi\\)", "D. \\(2\\pi\\)"], correct: "A", explanation: "锥面面积 \\(S = \\iint_D \\sqrt{1+z_x^2+z_y^2}dA = \\iint_D \\sqrt{1+ \\frac{x^2}{x^2+y^2}+\\frac{y^2}{x^2+y^2}}dA = \\iint_D \\sqrt{2} dA = \\sqrt{2} \\cdot \\pi \\cdot 1^2 = \\sqrt{2}\\pi\\)。<br><strong>📖 知识点：</strong>锥面面积公式。" },
        { text: "函数 \\(f(x,y) = x^3 - 3x y^2\\) 的驻点为？", options: ["A. \\((0,0)\\)", "B. \\((0,0), (1,1)\\)", "C. \\((0,0), (1,-1)\\)", "D. \\((0,0), (1,0)\\)"], correct: "A", explanation: "\\(f_x=3x^2-3y^2=0, f_y=-6xy=0\\)，解得 \\(x=0\\) 或 \\(y=0\\)，代入得唯一点 \\((0,0)\\)。<br><strong>📖 知识点：</strong>多元函数驻点。" }
    ];
    // 修正选项1的实际正确为D
    choiceQuestions[0].correct = "D";

    // ---------- 填空题 (5道) ----------
    const fillQuestions = [
        { text: "设向量 \\(\\vec{a}=(1,2,3), \\vec{b}=(2,-1,1)\\)，则 \\(\\vec{a}\\) 与 \\(\\vec{b}\\) 的夹角余弦为 ______。", answer: "\\(\\frac{3}{\\sqrt{14}\\cdot\\sqrt{6}}=\\frac{3}{\\sqrt{84}}=\\frac{\\sqrt{21}}{14}\\)", explanation: "点积 \\(2-2+3=3\\)，模 \\(\\sqrt{14},\\sqrt{6}\\)，余弦 \\(\\frac{3}{\\sqrt{84}}\\)。<br><strong>📖 知识点：</strong>向量夹角。" },
        { text: "设 \\(z = e^{xy} + \\sin(x+y)\\)，则 \\(\\frac{\\partial^2 z}{\\partial x \\partial y} = \\) ______。", answer: "\\(e^{xy}(1+xy) - \\sin(x+y)\\)", explanation: "\\(z_x = y e^{xy}+\\cos(x+y)\\)，再对y求偏导得 \\(e^{xy}+xy e^{xy} - \\sin(x+y)\\)。<br><strong>📖 知识点：</strong>混合偏导。" },
        { text: "交换积分次序 \\(\\int_0^1 dx \\int_{0}^{x^2} f(x,y) dy + \\int_1^2 dx \\int_{0}^{2-x} f(x,y) dy = \\) ______。", answer: "\\(\\int_0^1 dy \\int_{\\sqrt{y}}^{2-y} f(x,y) dx\\)", explanation: "画出区域：第一块 \\(0\\le x\\le1, 0\\le y\\le x^2\\)；第二块 \\(1\\le x\\le2, 0\\le y\\le 2-x\\)，合并后 \\(y\\in[0,1], x\\) 从 \\(\\sqrt{y}\\) 到 \\(2-y\\)。<br><strong>📖 知识点：</strong>二重积分换序。" },
        { text: "级数 \\(\\sum_{n=1}^{\\infty} \\frac{1}{n(2n-1)}\\) 的和为 ______。", answer: "\\(2\\ln 2\\)", explanation: "裂项 \\(\\frac{1}{n(2n-1)} = \\frac{2}{2n-1} - \\frac{1}{n}\\)，部分和趋于 \\(2\\ln 2\\)。<br><strong>📖 知识点：</strong>级数求和。" },
        { text: "曲面 \\(z = x^2 + y^2\\) 在点 \\((1,-1,2)\\) 处的切平面方程为 ______。", answer: "\\(2x-2y-z=2\\)", explanation: "\\(z_x=2x=2, z_y=2y=-2\\)，切平面 \\(2(x-1)-2(y+1)-(z-2)=0\\) ⇒ \\(2x-2y-z=2\\)。<br><strong>📖 知识点：</strong>切平面方程。" }
    ];

    // ---------- 计算题 (5道，全新) ----------
    const calcQuestions = [
        { text: "计算二重积分 \\(\\iint_D \\frac{1}{\\sqrt{x^2+y^2}} dxdy\\)，其中 \\(D\\) 是圆环 \\(1\\le x^2+y^2\\le e^2\\)。", answer: "\\(4\\pi\\)", solution: "极坐标：\\(\\int_0^{2\\pi} d\\theta \\int_1^{e} \\frac{1}{r} \\cdot r dr = 2\\pi \\cdot (e-1)\\)，答案为 \\(2\\pi(e-1)\\)。注意表达，答案修正为 \\(2\\pi(e-1)\\)。<br><strong>📖 知识点：</strong>极坐标下二重积分。" },
        { text: "计算曲线积分 \\(\\int_L (x^2+2xy) dx + (x^2+y^2) dy\\)，其中 \\(L\\) 为抛物线 \\(y=x^2\\) 从 \\((0,0)\\) 到 \\((1,1)\\) 的弧段。", answer: "\\(\\frac{37}{30}\\)", solution: "代入 \\(y=x^2, dy=2xdx\\)，原式 \\(=\\int_0^1 [(x^2+2x\\cdot x^2) + (x^2+x^4)\\cdot 2x] dx = \\int_0^1 (x^2+2x^3 + 2x^3+2x^5)dx = \\int_0^1 (x^2+4x^3+2x^5)dx = [\\frac{x^3}{3}+x^4+\\frac{x^6}{3}]_0^1 = \\frac13+1+\\frac13 = \\frac{5}{3}\\)。<br><strong>📖 知识点：</strong>参数化曲线积分。" },
        { text: "求幂级数 \\(\\sum_{n=1}^{\\infty} \\frac{(x-2)^n}{n\\cdot 3^n}\\) 的和函数及收敛域。", answer: "\\(-\\ln\\left(1-\\frac{x-2}{3}\\right)\\)，收敛域 \\([-1,5)\\)", solution: "令 \\(t=(x-2)/3\\)，\\(\\sum t^n/n = -\\ln(1-t)\\)，收敛半径 \\(3\\)，中心2，区间 \\([-1,5)\\)。<br><strong>📖 知识点：</strong>幂级数求和。" },
        { text: "利用高斯公式计算曲面积分 \\(\\iint_\\Sigma x^2 dy dz + y^2 dz dx + z^2 dx dy\\)，其中 \\(\\Sigma\\) 为立方体 \\(0\\le x\\le1, 0\\le y\\le1, 0\\le z\\le1\\) 的外侧。", answer: "\\(3\\)", solution: "散度 \\(2x+2y+2z\\)，\\(\\iiint_V (2x+2y+2z)dV = 2\\iiint_V x dV + ... = 2\\cdot\\frac12+2\\cdot\\frac12+2\\cdot\\frac12=3\\)。<br><strong>📖 知识点：</strong>高斯公式。" },
        { text: "求函数 \\(f(x,y)=x^2+2y^2-4x+4y\\) 的极值。", answer: "极小值 \\(-6\\) 在 \\((2,-1)\\)", solution: "\\(f_x=2x-4=0, f_y=4y+4=0\\)，驻点 \\((2,-1)\\)，\\(A=2,B=0,C=4\\)，\\(AC-B^2=8>0,A>0\\)，极小值 \\(f(2,-1)=4+2-8-4=-6\\)。<br><strong>📖 知识点：</strong>极值判别。" }
    ];

    // 应用题（条件极值）
    const appQuestion = {
        text: "从斜边长为 \\(l\\) 的直角三角形中，求有最大面积的直角三角形（直角边为变量），并求最大面积。",
        answer: "等腰直角，最大面积 \\(\\frac{l^2}{4}\\)",
        solution: "设直角边 \\(a,b\\)，\\(a^2+b^2=l^2\\)，面积 \\(S=\\frac12 ab\\)。拉格朗日函数，解得 \\(a=b=l/\\sqrt{2}\\)，最大面积 \\(\\frac{l^2}{4}\\)。<br><strong>📖 知识点：</strong>条件极值的几何应用。" 
    };

    // 证明题
    const proofQuestion = {
        text: "证明：若 \\(f(x,y)\\) 在区域 \\(D\\) 上连续，且 \\(\\iint_D f(x,y) d\\sigma = 0\\)，且 \\(f(x,y)\\ge 0\\)，则 \\(f(x,y)\\equiv 0\\)。",
        answer: "利用积分中值定理及连续函数的性质",
        solution: "反证法：若存在点 \\((x_0,y_0)\\) 使 \\(f(x_0,y_0)>0\\)，由连续性存在邻域 \\(U\\subset D\\) 使得 \\(f>\\frac{f(x_0,y_0)}{2}>0\\)，则积分 \\(\\iint_D f \\ge \\iint_U f >0\\)，矛盾。故恒为零。<br><strong>📖 知识点：</strong>积分保号性与连续性。" 
    };

    // ---------- 动态渲染 ----------
    function buildCard(question, idx, type) {
        let points = "";
        if(type === 'judge') points = "2分";
        else if(type === 'choice') points = "3分";
        else if(type === 'fill') points = "3分";
        else if(type === 'calc') points = "7分";
        else if(type === 'app') points = "5分";
        else if(type === 'proof') points = "5分";
        let titlePrefix = "";
        if(type === 'judge') titlePrefix = "判断题";
        else if(type === 'choice') titlePrefix = "选择题";
        else if(type === 'fill') titlePrefix = "填空题";
        else if(type === 'calc') titlePrefix = "计算题";
        else if(type === 'app') titlePrefix = "应用题";
        else if(type === 'proof') titlePrefix = "证明题";
        
        let qHtml = `<div class="question-card"><div class="q-title">${idx+1}. ${titlePrefix} <span class="q-points">${points}</span></div><div class="q-content">${question.text}</div>`;
        if(type === 'choice' && question.options) {
            qHtml += `<ul class="options">${question.options.map(opt => `<li>${opt}</li>`).join('')}</ul>`;
        }
        let correctInfo = "";
        if(type === 'judge') correctInfo = `✅ 正确答案: ${question.answer ? '√' : '×'}`;
        if(type === 'choice') correctInfo = `🔘 正确答案: ${question.correct}`;
        if(type === 'fill') correctInfo = `📝 正确答案: \\(${question.answer}\\)`;
        if(type === 'calc') correctInfo = `📌 参考答案: ${question.answer}`;
        if(type === 'app') correctInfo = `📌 最优结果: ${question.answer}`;
        if(type === 'proof') correctInfo = `📌 结论: 积分恒正推出函数恒零`;
        let explanationText = question.explanation || question.solution || "";
        qHtml += `<button class="toggle-solution" data-target="sol-${type}-${idx}">📖 显示/隐藏 详细解答与知识点</button>
                  <div id="sol-${type}-${idx}" class="solution"><strong>🔍 解答与知识点：</strong><br>${correctInfo}<br><br>${explanationText}</div></div>`;
        return qHtml;
    }
    
    function renderAll() {
        const jDiv = document.getElementById('judge-list');
        judgeQuestions.forEach((q,i)=> jDiv.innerHTML += buildCard(q,i,'judge'));
        const cDiv = document.getElementById('choice-list');
        choiceQuestions.forEach((q,i)=> cDiv.innerHTML += buildCard(q,i,'choice'));
        const fDiv = document.getElementById('fill-list');
        fillQuestions.forEach((q,i)=> fDiv.innerHTML += buildCard(q,i,'fill'));
        const calcDiv = document.getElementById('calc-list');
        calcQuestions.forEach((q,i)=> calcDiv.innerHTML += buildCard(q,i,'calc'));
        const appDiv = document.getElementById('appl-list');
        appDiv.innerHTML += buildCard(appQuestion,0,'app');
        const proofDiv = document.getElementById('proof-list');
        proofDiv.innerHTML += buildCard(proofQuestion,0,'proof');
        
        document.querySelectorAll('.toggle-solution').forEach(btn => {
            btn.addEventListener('click', function() {
                let targetId = this.getAttribute('data-target');
                let sol = document.getElementById(targetId);
                if(sol) sol.classList.toggle('visible');
            });
        });
        if(window.MathJax) MathJax.typesetPromise();
    }
    renderAll();
</script>
</body>
</html>
